<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RaceCal | 赛车赛历聚合</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800;850&family=Noto+Sans+SC:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="ambient-layer" aria-hidden="true"></div>
    <div class="intro-screen" aria-hidden="true">
      <div class="intro-card">
        <span class="intro-mark">RC</span>
        <span class="intro-name">RaceCal</span>
        <span class="intro-line"></span>
      </div>
    </div>
    <main class="app-shell">
      <section class="hero">
        <img src="./motorsport-calendar-hero.png" alt="赛车赛道与赛历网格" class="hero-image" />
        <div class="hero-overlay">
          <nav class="topbar" aria-label="主导航">
            <div class="brand">
              <span class="brand-mark">RC</span>
              <span>RaceCal</span>
            </div>
            <div class="top-actions">
              <button class="icon-button" aria-label="搜索">
                <svg class="ui-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
              </button>
              <button class="primary-button">同步日历</button>
            </div>
          </nav>

          <div class="hero-copy">
            <p class="eyebrow">全球赛车赛历聚合</p>
            <h1>按赛事或车手，整理你的全年比赛提醒。</h1>
            <p class="lead">
              覆盖 F1、FE、FE 2026-27、WEC、WRC、F2、F3、F1 Academy、Super Formula、IndyCar、NASCAR、NLS、MotoGP 等赛事。
            </p>
          </div>
        </div>
      </section>

      <section class="workspace" aria-label="赛历工作台">
        <aside class="sidebar">
          <div class="mode-toggle" role="tablist" aria-label="查看方式">
            <button class="mode-button active" data-mode="series" role="tab" aria-selected="true">赛事</button>
            <button class="mode-button" data-mode="driver" role="tab" aria-selected="false">车手</button>
          </div>

          <label class="search-box">
            <span class="label-with-icon"><svg class="ui-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>搜索</span>
            <input id="searchInput" type="search" placeholder="F1 / Verstappen / WEC" />
          </label>

          <div class="section-title">
            <span id="listTitle">赛事分类</span>
            <small id="listCount">13</small>
          </div>
          <div class="list-shell">
            <div id="categoryList" class="category-list"></div>
            <div id="alphaIndex" class="alpha-index" aria-label="车手首字母索引"></div>
          </div>
        </aside>

        <section class="panel">
          <div class="panel-header">
            <div>
              <p class="eyebrow" id="panelEyebrow">2026 Season</p>
              <h2 id="panelTitle">Formula 1</h2>
              <p id="panelMeta" class="muted">世界一级方程式锦标赛</p>
            </div>

            <div class="calendar-controls">
              <button id="selectUpcomingBtn" class="secondary-button icon-label"><span aria-hidden="true"><svg class="ui-icon" viewBox="0 0 24 24" fill="none"><path d="M20 6 9 17l-5-5"/></svg></span>选择未开始的比赛</button>
              <button id="clearSelectionBtn" class="secondary-button icon-label"><span aria-hidden="true"><svg class="ui-icon" viewBox="0 0 24 24" fill="none"><path d="M18 6 6 18"/><path d="M6 6l12 12"/></svg></span>清空已选比赛</button>
              <label>
                <span>提醒</span>
                <select id="reminderSelect">
                  <option value="10">提前 10 分钟</option>
                  <option value="30">提前 30 分钟</option>
                  <option value="60">提前 1 小时</option>
                </select>
              </label>
              <button id="downloadBtn" class="primary-button icon-label"><span aria-hidden="true"><svg class="ui-icon" viewBox="0 0 24 24" fill="none"><path d="M8 2v4"/><path d="M16 2v4"/><rect x="3" y="5" width="18" height="16" rx="3"/><path d="M3 10h18"/><path d="M12 14v4"/><path d="M10 16h4"/></svg></span>预约已选择比赛</button>
            </div>
          </div>

          <div class="stats-row">
            <div class="stat">
              <span id="nextRaceDate">07.03</span>
              <small><span aria-hidden="true"><svg class="ui-icon" viewBox="0 0 24 24" fill="none"><path d="M5 12h14"/><path d="m13 6 6 6-6 6"/></svg></span> 下一场</small>
            </div>
            <div class="stat">
              <span id="nextRaceTime">19:30</span>
              <small><span aria-hidden="true"><svg class="ui-icon" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg></span> 北京时间</small>
            </div>
            <div class="stat">
              <span id="eventCount">6</span>
              <small><span aria-hidden="true"><svg class="ui-icon" viewBox="0 0 24 24" fill="none"><rect x="4" y="4" width="6" height="6" rx="1"/><rect x="14" y="4" width="6" height="6" rx="1"/><rect x="4" y="14" width="6" height="6" rx="1"/><rect x="14" y="14" width="6" height="6" rx="1"/></svg></span> 所有赛事场次</small>
            </div>
          </div>

          <div class="toolbar">
            <button class="filter-chip active" data-filter="all"><span aria-hidden="true"><svg class="ui-icon" viewBox="0 0 24 24" fill="none"><rect x="4" y="4" width="6" height="6" rx="1"/><rect x="14" y="4" width="6" height="6" rx="1"/><rect x="4" y="14" width="6" height="6" rx="1"/><rect x="14" y="14" width="6" height="6" rx="1"/></svg></span>全部</button>
            <button class="filter-chip" data-filter="practice"><span aria-hidden="true"><svg class="ui-icon" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="8"/></svg></span>练习</button>
            <button class="filter-chip" data-filter="sprintQualifying"><span aria-hidden="true"><svg class="ui-icon" viewBox="0 0 24 24" fill="none"><path d="M13 2 4 14h7l-1 8 9-12h-7l1-8Z"/></svg></span>冲刺排位</button>
            <button class="filter-chip" data-filter="sprint"><span aria-hidden="true"><svg class="ui-icon" viewBox="0 0 24 24" fill="none"><path d="m7 7 5 5-5 5"/><path d="m13 7 5 5-5 5"/></svg></span>冲刺赛</button>
            <button class="filter-chip" data-filter="race"><span aria-hidden="true"><svg class="ui-icon" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="2" fill="currentColor" stroke="none"/></svg></span>正赛</button>
            <button class="filter-chip" data-filter="qualifying"><span aria-hidden="true"><svg class="ui-icon" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="3"/><path d="M12 2v3"/><path d="M12 19v3"/><path d="M2 12h3"/><path d="M19 12h3"/></svg></span>排位</button>
            <button class="filter-chip" data-filter="endurance"><span aria-hidden="true"><svg class="ui-icon" viewBox="0 0 24 24" fill="none"><path d="M7 8c-2.5 0-4 2-4 4s1.5 4 4 4c3 0 5-8 10-8 2.5 0 4 2 4 4s-1.5 4-4 4c-3 0-5-8-10-8Z"/></svg></span>耐力赛</button>
          </div>

          <div id="scheduleList" class="schedule-list" aria-live="polite"></div>
        </section>
      </section>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script src="./app.js"></script>
  </body>
</html>
